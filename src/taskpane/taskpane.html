<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CellFocus</title>
    <!-- Office.js must load before the app bundle -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
</head>
<body>
    <header class="header">
        <span class="logo">CellFocus</span>
        <span class="sync-status" id="sync-status">
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-text"></span>
        </span>
    </header>

    <nav class="tab-bar" id="tab-bar">
        <!-- tabs injected by JS -->
        <button class="add-tab-btn" id="add-tab-btn" title="Add Range">+</button>
    </nav>

    <main class="grid-container" id="grid-container">
        <div class="empty-state" id="empty-state">
            <p id="empty-message"></p>
            <button class="primary-btn" id="capture-btn"></button>
        </div>
    </main>

    <footer class="footer">
        <span id="range-info"></span>
    </footer>
</body>
</html>
